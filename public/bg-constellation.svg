<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#12101e"/>
      <stop offset="60%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#060608"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a6b5a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a455" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  
  <!-- Teal glow spots -->
  <circle cx="300" cy="200" r="250" fill="url(#glow1)"/>
  <circle cx="1600" cy="800" r="300" fill="url(#glow1)"/>
  <circle cx="960" cy="100" r="400" fill="url(#glow2)"/>
  <circle cx="200" cy="900" r="200" fill="url(#glow2)"/>
  
  <!-- Stars -->
  <g fill="#c8a455">
    <circle cx="120" cy="80" r="1.5" opacity="0.6"/>
    <circle cx="350" cy="150" r="1" opacity="0.4"/>
    <circle cx="580" cy="60" r="1.8" opacity="0.7"/>
    <circle cx="750" cy="200" r="1" opacity="0.3"/>
    <circle cx="960" cy="50" r="2" opacity="0.8"/>
    <circle cx="1100" cy="180" r="1.2" opacity="0.5"/>
    <circle cx="1350" cy="90" r="1.5" opacity="0.6"/>
    <circle cx="1550" cy="160" r="1" opacity="0.4"/>
    <circle cx="1780" cy="70" r="1.8" opacity="0.7"/>
    <circle cx="200" cy="350" r="1" opacity="0.3"/>
    <circle cx="450" cy="400" r="1.5" opacity="0.5"/>
    <circle cx="700" cy="350" r="1.2" opacity="0.4"/>
    <circle cx="900" cy="450" r="1" opacity="0.3"/>
    <circle cx="1200" cy="380" r="1.5" opacity="0.6"/>
    <circle cx="1450" cy="420" r="1" opacity="0.4"/>
    <circle cx="1700" cy="350" r="1.8" opacity="0.5"/>
    <circle cx="100" cy="600" r="1.2" opacity="0.4"/>
    <circle cx="380" cy="650" r="1" opacity="0.3"/>
    <circle cx="600" cy="580" r="1.5" opacity="0.5"/>
    <circle cx="850" cy="700" r="1" opacity="0.3"/>
    <circle cx="1050" cy="620" r="1.8" opacity="0.6"/>
    <circle cx="1300" cy="680" r="1" opacity="0.4"/>
    <circle cx="1550" cy="600" r="1.5" opacity="0.5"/>
    <circle cx="1800" cy="650" r="1.2" opacity="0.4"/>
    <circle cx="250" cy="850" r="1" opacity="0.3"/>
    <circle cx="500" cy="900" r="1.5" opacity="0.5"/>
    <circle cx="780" cy="850" r="1" opacity="0.4"/>
    <circle cx="1000" cy="950" r="1.8" opacity="0.6"/>
    <circle cx="1250" cy="880" r="1" opacity="0.3"/>
    <circle cx="1500" cy="950" r="1.5" opacity="0.5"/>
    <circle cx="1750" cy="900" r="1.2" opacity="0.4"/>
  </g>
  
  <!-- Constellation lines -->
  <g stroke="#c8a455" stroke-width="0.5" opacity="0.12">
