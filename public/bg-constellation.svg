    <line x1="120" y1="80" x2="350" y2="150"/>
    <line x1="350" y1="150" x2="580" y2="60"/>
    <line x1="350" y1="150" x2="200" y2="350"/>
    <line x1="200" y1="350" x2="450" y2="400"/>
    
    <!-- Constellation 2 - top center -->
    <line x1="750" y1="200" x2="960" y2="50"/>
    <line x1="960" y1="50" x2="1100" y2="180"/>
    <line x1="1100" y1="180" x2="900" y2="450"/>
    <line x1="900" y1="450" x2="700" y2="350"/>
    <line x1="700" y1="350" x2="750" y2="200"/>
    
    <!-- Constellation 3 - top right -->
    <line x1="1350" y1="90" x2="1550" y2="160"/>
    <line x1="1550" y1="160" x2="1780" y2="70"/>
    <line x1="1550" y1="160" x2="1450" y2="420"/>
    <line x1="1450" y1="420" x2="1700" y2="350"/>
    
    <!-- Constellation 4 - bottom left -->
    <line x1="100" y1="600" x2="380" y2="650"/>
    <line x1="380" y1="650" x2="250" y2="850"/>
    <line x1="250" y1="850" x2="500" y2="900"/>
    <line x1="380" y1="650" x2="600" y2="580"/>
    
    <!-- Constellation 5 - bottom center -->
    <line x1="850" y1="700" x2="1050" y2="620"/>
    <line x1="1050" y1="620" x2="1300" y2="680"/>
    <line x1="1300" y1="680" x2="1250" y2="880"/>
    <line x1="1250" y1="880" x2="1000" y2="950"/>
    <line x1="1000" y1="950" x2="780" y2="850"/>
    <line x1="780" y1="850" x2="850" y2="700"/>
    
    <!-- Constellation 6 - bottom right -->
    <line x1="1550" y1="600" x2="1800" y2="650"/>
    <line x1="1800" y1="650" x2="1750" y2="900"/>
    <line x1="1750" y1="900" x2="1500" y2="950"/>
    <line x1="1500" y1="950" x2="1550" y2="600"/>
  </g>
  
  <!-- Corner ornaments -->
  <g stroke="#c8a455" fill="none" stroke-width="0.8" opacity="0.15">
    <!-- Top left corner -->
    <path d="M 30 5 Q 5 5 5 30" />
    <path d="M 60 5 Q 5 5 5 60" />
    <path d="M 5 5 L 80 5" />
    <path d="M 5 5 L 5 80" />
    
    <!-- Top right corner -->
    <path d="M 1890 5 Q 1915 5 1915 30" />
    <path d="M 1860 5 Q 1915 5 1915 60" />
    <path d="M 1840 5 L 1915 5" />
    <path d="M 1915 5 L 1915 80" />
    
    <!-- Bottom left corner -->
    <path d="M 30 1075 Q 5 1075 5 1050" />
    <path d="M 60 1075 Q 5 1075 5 1020" />
    <path d="M 5 1075 L 80 1075" />
    <path d="M 5 1000 L 5 1075" />
    
    <!-- Bottom right corner -->
    <path d="M 1890 1075 Q 1915 1075 1915 1050" />
    <path d="M 1860 1075 Q 1915 1075 1915 1020" />
    <path d="M 1840 1075 L 1915 1075" />
    <path d="M 1915 1000 L 1915 1075" />
  </g>
  
  <!-- Decorative arc at top center -->
  <g stroke="#c8a455" fill="none" stroke-width="0.6" opacity="0.1">
    <path d="M 760 0 Q 960 40 1160 0"/>
    <path d="M 800 0 Q 960 30 1120 0"/>
